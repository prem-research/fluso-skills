<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Fluso Skills marketplace overview</title>
  <desc id="desc">A visual workflow showing how skills move from this public GitHub repository into the Fluso marketplace, then into a user's workspace where agents can use them.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="675" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111211"/>
      <stop offset="0.52" stop-color="#171816"/>
      <stop offset="1" stop-color="#101516"/>
    </linearGradient>
    <linearGradient id="accent" x1="142" y1="86" x2="1048" y2="551" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6EE7B7"/>
      <stop offset="0.52" stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#FDE68A"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#232421"/>
      <stop offset="1" stop-color="#191A18"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#FFFFFF" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="675" rx="34" fill="url(#bg)"/>
  <rect width="1200" height="675" rx="34" fill="url(#grid)"/>
  <rect x="44" y="42" width="1112" height="591" rx="28" fill="#171816" fill-opacity="0.72" stroke="#FFFFFF" stroke-opacity="0.08"/>

  <g transform="translate(84 76)">
    <rect width="44" height="44" rx="13" fill="#F4F1EA"/>
    <path d="M14 29C14 22.4 18.5 16.5 25.8 15.2C29.2 14.6 32.2 15.3 34.8 16.8C33.7 22 29.3 26.1 23.7 27.1C20.3 27.7 17 27.1 14 29Z" fill="#191A18"/>
    <path d="M28.7 32.1C23.1 34.3 16.5 31.8 13.7 26.2C16.9 23.8 20.6 22.3 24.7 22.4C29.4 22.6 33.4 24.8 36.1 28.1C34.3 29.8 31.8 30.9 28.7 32.1Z" fill="#6EE7B7"/>
  </g>

  <text x="144" y="96" fill="#F4F1EA" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" font-weight="650">Fluso Skills</text>
  <text x="144" y="127" fill="#B9BAB5" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17">Optional workflows that turn reusable know-how into workspace capabilities.</text>

  <g transform="translate(889 78)">
    <rect width="212" height="42" rx="21" fill="#22231F" stroke="#FFFFFF" stroke-opacity="0.1"/>
    <circle cx="24" cy="21" r="6" fill="#6EE7B7"/>
    <text x="42" y="27" fill="#E9E6DD" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="560">Public catalog for Fluso</text>
  </g>

  <path d="M300 315 C368 315 372 315 435 315" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
  <path d="M431 307 L444 315 L431 323" stroke="#7DD3FC" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M628 315 C696 315 700 315 763 315" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
  <path d="M759 307 L772 315 L759 323" stroke="#FDE68A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#softShadow)">
    <rect x="88" y="180" width="246" height="270" rx="24" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.1"/>
    <rect x="112" y="204" width="54" height="54" rx="16" fill="#2B2D28"/>
    <path d="M129 241V221C129 219.3 130.3 218 132 218H146L153 225V241C153 242.7 151.7 244 150 244H132C130.3 244 129 242.7 129 241Z" stroke="#6EE7B7" stroke-width="2"/>
    <path d="M146 218V225H153" stroke="#6EE7B7" stroke-width="2"/>
    <text x="112" y="293" fill="#F4F1EA" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="650">Publish</text>
    <text x="112" y="323" fill="#B9BAB5" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15">Skills live in this repo as</text>
    <text x="112" y="344" fill="#B9BAB5" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15">reviewable instruction packages.</text>
    <g transform="translate(112 374)">
      <rect width="178" height="34" rx="10" fill="#151613" stroke="#FFFFFF" stroke-opacity="0.08"/>
      <text x="14" y="22" fill="#E9E6DD" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13">marketplace.json</text>
    </g>
    <g transform="translate(112 416)">
      <rect width="148" height="34" rx="10" fill="#151613" stroke="#FFFFFF" stroke-opacity="0.08"/>
      <text x="14" y="22" fill="#E9E6DD" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13">skills/*/SKILL.md</text>
    </g>
  </g>

  <g filter="url(#softShadow)">
    <rect x="437" y="160" width="326" height="310" rx="28" fill="#20211E" stroke="#FFFFFF" stroke-opacity="0.11"/>
    <rect x="465" y="188" width="270" height="66" rx="18" fill="#151613" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <text x="489" y="217" fill="#F4F1EA" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="620">Skill Marketplace</text>
    <text x="489" y="240" fill="#A6A7A1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13">Discover optional skills when they are useful.</text>

    <g transform="translate(465 282)">
      <rect width="122" height="70" rx="16" fill="#292B26" stroke="#FFFFFF" stroke-opacity="0.09"/>
      <text x="18" y="29" fill="#E9E6DD" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="590">Content</text>
      <text x="18" y="51" fill="#8F918A" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">Podcast</text>
    </g>
    <g transform="translate(602 282)">
      <rect width="133" height="70" rx="16" fill="#292B26" stroke="#FFFFFF" stroke-opacity="0.09"/>
      <text x="18" y="29" fill="#E9E6DD" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="590">Finance</text>
      <text x="18" y="51" fill="#8F918A" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">Forecast</text>
    </g>
    <g transform="translate(465 367)">
      <rect width="122" height="70" rx="16" fill="#292B26" stroke="#FFFFFF" stroke-opacity="0.09"/>
      <text x="18" y="29" fill="#E9E6DD" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="590">Legal</text>
      <text x="18" y="51" fill="#8F918A" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">Review</text>
    </g>
    <g transform="translate(602 367)">
      <rect width="133" height="70" rx="16" fill="#292B26" stroke="#FFFFFF" stroke-opacity="0.09"/>
      <text x="18" y="29" fill="#E9E6DD" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="590">Research</text>
      <text x="18" y="51" fill="#8F918A" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">Briefs</text>
    </g>
  </g>

  <g filter="url(#softShadow)">
    <rect x="820" y="180" width="292" height="270" rx="24" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.1"/>
    <rect x="844" y="204" width="244" height="58" rx="18" fill="#151613" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <circle cx="872" cy="233" r="13" fill="#6EE7B7" fill-opacity="0.22" stroke="#6EE7B7" stroke-width="1.4"/>
    <path d="M866 233L870 237L879 228" stroke="#6EE7B7" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="897" y="238" fill="#F4F1EA" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="620">Add to workspace</text>

    <text x="844" y="304" fill="#F4F1EA" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="650">Use</text>
    <text x="844" y="334" fill="#B9BAB5" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15">Only selected skills are copied</text>
    <text x="844" y="355" fill="#B9BAB5" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15">into the user's workspace.</text>

    <g transform="translate(844 388)">
      <rect width="96" height="34" rx="17" fill="#2A2C27" stroke="#FFFFFF" stroke-opacity="0.08"/>
      <circle cx="22" cy="17" r="5" fill="#7DD3FC"/>
      <text x="36" y="22" fill="#E9E6DD" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13">Private</text>
    </g>
    <g transform="translate(952 388)">
      <rect width="110" height="34" rx="17" fill="#2A2C27" stroke="#FFFFFF" stroke-opacity="0.08"/>
      <circle cx="22" cy="17" r="5" fill="#FDE68A"/>
      <text x="36" y="22" fill="#E9E6DD" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13">Removable</text>
    </g>
  </g>

  <g transform="translate(135 516)">
    <rect width="930" height="76" rx="24" fill="#111210" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <text x="34" y="32" fill="#F4F1EA" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="620">The idea</text>
    <text x="34" y="55" fill="#B9BAB5" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15">A skill is not another app. It is reusable workflow knowledge that helps Fluso ask, decide, and ship with the right context.</text>
    <rect x="762" y="20" width="134" height="36" rx="18" fill="#F4F1EA"/>
    <text x="792" y="43" fill="#151613" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="650">fluso.ai</text>
  </g>
</svg>
